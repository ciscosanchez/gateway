name: Gateway CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Validate docker-compose.yml
      run: docker compose config
    
    - name: Check for secrets in code
      run: |
        if grep -r "samsara_api_" . --exclude-dir=.git --exclude="*.md" --exclude=".env.example"; then
          echo "ERROR: Found potential secrets in code"
          exit 1
        fi
    
    - name: Validate scripts
      run: |
        chmod +x scripts/*.sh
        bash -n scripts/*.sh
    
    - name: Run config validation
      run: |
        chmod +x scripts/validate-config.sh
        # Skip .env checks in CI
        sed -i 's/if \[ ! -f "\.env" \]/if false/' scripts/validate-config.sh
        ./scripts/validate-config.sh || true

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Create .env file
      run: cp .env.example .env
    
    - name: Start services
      run: |
        docker compose up -d
        sleep 60
    
    - name: Check service health
      run: |
        docker compose ps
        docker compose logs
    
    - name: Run smoke tests
      run: |
        chmod +x scripts/test.sh
        ./scripts/test.sh || true
    
    - name: Check for errors in logs
      run: |
        if docker compose logs 2>&1 | grep -i "error" | grep -v "level=error.*health.*healthy"; then
          echo "Errors found in service logs"
          docker compose logs
          exit 1
        fi
    
    - name: Cleanup
      if: always()
      run: docker compose down -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: '.'
    
    - name: Check for hardcoded secrets
      run: |
        # Check for common secret patterns
        if grep -r "password.*=.*['\"]" . --exclude-dir=.git --exclude="*.md" --exclude=".env.example" --exclude-dir=docs; then
          echo "WARNING: Potential hardcoded passwords found"
        fi

  lint:
    name: Lint Configuration Files
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Lint YAML files
      run: |
        find . -name "*.yml" -o -name "*.yaml" | while read file; do
          echo "Checking $file"
          docker run --rm -v $(pwd):/data cytopia/yamllint "$file" || true
        done
    
    - name: Check shell scripts
      run: |
        find scripts -name "*.sh" | while read script; do
          echo "Linting $script"
          docker run --rm -v $(pwd):/mnt koalaman/shellcheck:stable "$script" || true
        done
