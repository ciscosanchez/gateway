name: Gateway CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Static validation
  # ---------------------------------------------------------------------------
  validate:
    name: Validate configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render .env.example into .env (placeholders only)
        run: cp .env.example .env

      - name: Validate docker-compose
        run: docker compose config -q

      - name: Validate Kong declarative config
        run: |
          docker run --rm -v "$PWD/kong:/kong:ro" \
            -e KONG_DATABASE=off \
            -e KONG_DECLARATIVE_CONFIG=/kong/kong.yml \
            kong/kong-gateway:3.6 \
            kong config parse /kong/kong.yml

      - name: Validate workflow JSON
        run: |
          for f in workflows/*.json; do
            echo "Parsing $f"
            python3 -c "import json,sys; json.load(open('$f'))"
          done

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              braces: disable
              colons: disable
              comments: { min-spaces-from-content: 1 }
              truthy: { check-keys: false }

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning

  # ---------------------------------------------------------------------------
  # Secret scanning - BLOCKING
  # ---------------------------------------------------------------------------
  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Grep sanity check for known token patterns
        run: |
          set -e
          if grep -REn "samsara_api_[A-Za-z0-9]{20,}" \
               --exclude-dir=.git --exclude='*.md' --exclude='.env.example' .; then
            echo "::error::Samsara API token pattern found in source tree"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Image + config vulnerability scanning - BLOCKING
  # ---------------------------------------------------------------------------
  security:
    name: Trivy scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy filesystem (secrets + vuln)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy image scans - CRITICAL fixable only, blocking
        # Accepted CVEs live in .trivyignore; the file explains why each was
        # accepted and the quarterly review cadence. New CRITICAL findings
        # not in the ignore list fail the pipeline.
        run: |
          set -eu
          failed=""
          for image in \
            kong/kong-gateway:3.6 \
            redpandadata/redpanda:v24.1.7 \
            n8nio/n8n:1.28.0 \
            postgres:15-alpine \
            redis:7-alpine \
            prom/prometheus:v2.51.0 \
            prom/alertmanager:v0.27.0 \
            grafana/grafana:10.4.1 \
            grafana/loki:2.9.6 \
            grafana/promtail:2.9.6
          do
            echo "=== $image ==="
            if ! docker run --rm \
                 -v /var/run/docker.sock:/var/run/docker.sock \
                 -v "$PWD/.trivyignore:/.trivyignore:ro" \
                 aquasec/trivy:latest image --quiet --no-progress \
                 --ignorefile /.trivyignore \
                 --severity CRITICAL --ignore-unfixed --exit-code 1 "$image"; then
              failed="${failed} ${image}"
            fi
          done
          if [ -n "${failed}" ]; then
            echo "::error::Images with fixable CRITICAL CVEs not in .trivyignore:${failed}"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Smoke test - bring up stack and hit Kong
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [validate, secrets]
    steps:
      - uses: actions/checkout@v4
      - name: Render env
        run: cp .env.example .env
      - name: Generate self-signed TLS
        run: |
          mkdir -p config/kong/certs
          openssl req -x509 -newkey rsa:2048 -sha256 -days 1 -nodes \
            -keyout config/kong/certs/server.key \
            -out    config/kong/certs/server.crt \
            -subj "/CN=localhost"
      - name: docker compose up (lite profile for CI)
        id: compose_up
        run: docker compose -f docker-compose.yml -f docker-compose.lite.yml up -d --wait --wait-timeout 420
      - name: Dump logs on failure
        if: failure() && steps.compose_up.outcome == 'failure'
        run: |
          echo "=== ps ==="
          docker compose -f docker-compose.yml -f docker-compose.lite.yml ps -a || true
          for c in gateway-redpanda-0 gateway-n8n gateway-kong gateway-postgres \
                   gateway-alertmanager gateway-prometheus gateway-grafana \
                   gateway-redis; do
            echo "=== ${c} ==="
            docker logs "${c}" 2>&1 | tail -80 || true
          done
      - name: Services status
        run: docker compose -f docker-compose.yml -f docker-compose.lite.yml ps
      - name: Kong admin health
        run: curl -fsS http://127.0.0.1:8001/status
      - name: Prometheus health
        run: curl -fsS http://127.0.0.1:9090/-/ready
      - name: Fail on service errors
        run: |
          if docker compose -f docker-compose.yml -f docker-compose.lite.yml logs 2>&1 \
             | grep -Ei "panic|fatal|level=error" \
             | grep -vE "healthz|health check|diskstats_linux.go|/run/udev/data"; then
            echo "::error::Errors found in service logs"
            docker compose -f docker-compose.yml -f docker-compose.lite.yml logs
            exit 1
          fi
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.lite.yml down -v
