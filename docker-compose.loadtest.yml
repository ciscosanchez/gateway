# Load-test compose overlay.
#
# Applies ONLY the knobs that need to relax to run scripts/load-test.sh:
#   - Kong rate-limit: 100/min -> effectively unlimited
#   - Kong IP allowlist: private CIDRs -> 0.0.0.0/0 (curl from the host
#     through Docker Desktop's NAT appears as a public IP)
#   - samsara-client API key: REPLACE_ME_* -> a real dev value the script uses
#
# This overlay does NOT edit kong/kong.yml. scripts/load-test.sh generates
# /tmp/kong.loadtest.yml from kong/kong.yml by substituting just those three
# values, then this overlay mounts that generated file in place. When the
# test finishes, the overlay is detached and Kong reverts to the canonical
# kong/kong.yml. Zero drift risk, zero artifacts committed with relaxed
# values.
#
# Usage (invoked automatically by scripts/load-test.sh):
#   docker compose -f docker-compose.yml -f docker-compose.loadtest.yml \
#     up -d kong
#
# Or manually (for debugging a load-test scenario):
#   ./scripts/load-test.sh --prep-only    # generates /tmp/kong.loadtest.yml
#   docker compose -f docker-compose.yml -f docker-compose.loadtest.yml \
#     up -d kong
#   # ... poke ...
#   docker compose up -d kong             # revert
#
services:
  kong:
    volumes:
      # Overrides the kong/kong.yml mount from docker-compose.yml. The
      # second mount wins. /tmp/kong.loadtest.yml is generated by
      # scripts/load-test.sh right before `up`.
      - /tmp/kong.loadtest.yml:/etc/kong/kong.yml:ro
