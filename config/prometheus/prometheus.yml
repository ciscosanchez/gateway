global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: gateway

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: kong
    metrics_path: /metrics
    static_configs:
      - targets: ["kong:8001"]

  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: ["n8n:5678"]

  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets:
          - "redpanda-0:9644"
          - "redpanda-1:9644"
          - "redpanda-2:9644"

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
