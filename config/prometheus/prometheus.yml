global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'gateway-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8001']
    metrics_path: '/metrics'

  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: '/metrics'

  # PostgreSQL metrics require postgres_exporter
  # Uncomment and add postgres_exporter to docker-compose.yml:
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
