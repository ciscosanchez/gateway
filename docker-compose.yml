# ============================================================================
# Gateway - Integration Platform
# ----------------------------------------------------------------------------
# Production-capable docker-compose. Still fits on a single host for dev but:
#   - Kong runs DB-less (declarative) -> fewer moving parts
#   - Redpanda is a 3-node cluster with replication_factor=3
#   - n8n runs in queue mode with Redis + dedicated workers
#   - All admin UIs (Kong admin/manager, n8n, Prometheus, Loki, exporters)
#     are bound to 127.0.0.1 only. Public traffic goes through Kong on 443.
#   - Full observability stack: prometheus+alertmanager+grafana+loki+promtail
#     +node_exporter+cadvisor+postgres_exporter
#
# Production notes:
#   * Swap the single Postgres for RDS/CloudSQL (TLS, PITR).
#   * Swap Redpanda for Redpanda Cloud / MSK or run 3 nodes on separate hosts.
#   * Put Kong behind an L4/L7 LB; run >=2 Kong replicas.
#   * Inject secrets via your secret manager; this file consumes env only.
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    tag: "{{.Name}}"

x-restart: &default-restart
  restart: unless-stopped

services:
  # --------------------------------------------------------------------------
  # Postgres - application state (n8n + any app data)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: gateway-postgres
    <<: *default-restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - ssl=off                        # TLS terminated at managed DB or sidecar in prod
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_statement=ddl
      - -c
      - max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Internal network only. Do NOT publish 5432 in prod.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits: { cpus: '2.0', memory: 2G }
        reservations: { cpus: '0.5', memory: 512M }
    networks: [gateway-network]
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Redis - n8n queue mode broker + Kong shared rate-limit counters
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    <<: *default-restart
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 768M }
        reservations: { cpus: '0.1', memory: 128M }
    networks: [gateway-network]
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Redpanda cluster (3 nodes) - Kafka-compatible message bus
  # --------------------------------------------------------------------------
  redpanda-0:
    image: redpandadata/redpanda:v24.1.7
    container_name: gateway-redpanda-0
    <<: *default-restart
    command:
      - redpanda
      - start
      - --node-id=0
      - --seeds=redpanda-0:33145,redpanda-1:33145,redpanda-2:33145
      - --kafka-addr=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr=INTERNAL://redpanda-0:29092,EXTERNAL://localhost:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda-0:33145
      - --pandaproxy-addr=INTERNAL://0.0.0.0:28082
      - --advertise-pandaproxy-addr=INTERNAL://redpanda-0:28082
      - --set=redpanda.default_topic_replications=3
      - --set=redpanda.auto_create_topics_enabled=false
      - --smp=1
      - --memory=1G
    volumes:
      - redpanda0_data:/var/lib/redpanda/data
    expose: ["9092", "29092", "28082", "33145", "9644"]
    ports:
      # Only node-0 publishes the external Kafka port for local tooling.
      # In prod, use a private listener and expose nothing to the internet.
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -qE 'Healthy:\\s+true'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: '2.0', memory: 2G }
        reservations: { cpus: '1.0', memory: 1G }
    networks: [gateway-network]
    logging: *default-logging

  redpanda-1:
    image: redpandadata/redpanda:v24.1.7
    container_name: gateway-redpanda-1
    <<: *default-restart
    command:
      - redpanda
      - start
      - --node-id=1
      - --seeds=redpanda-0:33145,redpanda-1:33145,redpanda-2:33145
      - --kafka-addr=INTERNAL://0.0.0.0:29092
      - --advertise-kafka-addr=INTERNAL://redpanda-1:29092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda-1:33145
      - --set=redpanda.default_topic_replications=3
      - --set=redpanda.auto_create_topics_enabled=false
      - --smp=1
      - --memory=1G
    volumes:
      - redpanda1_data:/var/lib/redpanda/data
    expose: ["29092", "33145", "9644"]
    deploy:
      resources:
        limits: { cpus: '2.0', memory: 2G }
        reservations: { cpus: '1.0', memory: 1G }
    networks: [gateway-network]
    logging: *default-logging

  redpanda-2:
    image: redpandadata/redpanda:v24.1.7
    container_name: gateway-redpanda-2
    <<: *default-restart
    command:
      - redpanda
      - start
      - --node-id=2
      - --seeds=redpanda-0:33145,redpanda-1:33145,redpanda-2:33145
      - --kafka-addr=INTERNAL://0.0.0.0:29092
      - --advertise-kafka-addr=INTERNAL://redpanda-2:29092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda-2:33145
      - --set=redpanda.default_topic_replications=3
      - --set=redpanda.auto_create_topics_enabled=false
      - --smp=1
      - --memory=1G
    volumes:
      - redpanda2_data:/var/lib/redpanda/data
    expose: ["29092", "33145", "9644"]
    deploy:
      resources:
        limits: { cpus: '2.0', memory: 2G }
        reservations: { cpus: '1.0', memory: 1G }
    networks: [gateway-network]
    logging: *default-logging

  redpanda-console:
    image: redpandadata/console:v2.5.2
    container_name: gateway-redpanda-console
    <<: *default-restart
    environment:
      KAFKA_BROKERS: redpanda-0:29092,redpanda-1:29092,redpanda-2:29092
    # Admin UI - loopback only
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      redpanda-0: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }
    networks: [gateway-network]
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Kong - DB-less / declarative. No kong-database container, no migrations.
  # --------------------------------------------------------------------------
  kong:
    image: kong/kong-gateway:3.6
    container_name: gateway-kong
    <<: *default-restart
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # Admin API only on loopback inside container; we also only publish to 127.0.0.1
      KONG_ADMIN_LISTEN: "127.0.0.1:8001"
      KONG_ADMIN_GUI_URL: "http://localhost:8002"
      KONG_ADMIN_GUI_LISTEN: "127.0.0.1:8002"
      # Proxy listeners (HTTP redirects to HTTPS via route-level plugin)
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl http2"
      # Allow our pre-function plugin to use resty libs
      KONG_UNTRUSTED_LUA: "sandbox"
      KONG_PLUGINS: "bundled"
      # Redis for shared rate-limit counters
      KONG_NGINX_WORKER_PROCESSES: "auto"
      # Trust X-Forwarded-* from LB only
      KONG_TRUSTED_IPS: "0.0.0.0/0,::/0"
      KONG_REAL_IP_HEADER: "X-Forwarded-For"
      KONG_REAL_IP_RECURSIVE: "on"
      # Stricter TLS defaults
      KONG_SSL_PROTOCOLS: "TLSv1.2 TLSv1.3"
      KONG_SSL_CIPHER_SUITE: "modern"
      # Tuning
      KONG_NGINX_HTTP_CLIENT_MAX_BODY_SIZE: "10m"
      KONG_NGINX_HTTP_CLIENT_BODY_BUFFER_SIZE: "2m"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
      - ./config/kong/certs:/etc/kong/certs:ro
    ports:
      # Public proxy
      - "8000:8000"
      - "8443:8443"
      # Admin - loopback only; use SSH tunnel / VPN to reach from outside
      - "127.0.0.1:8001:8001"
      - "127.0.0.1:8002:8002"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits: { cpus: '2.0', memory: 2G }
        reservations: { cpus: '0.5', memory: 512M }
    networks: [gateway-network]
    logging: *default-logging

  # --------------------------------------------------------------------------
  # n8n - queue mode: main (API + webhooks) + N workers
  # --------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:1.28.0
    container_name: gateway-n8n
    <<: *default-restart
    environment:
      # Queue mode
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Persistence
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # Auth
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # Public-facing
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_PROXY_HOPS: "1"
      # Hygiene
      GENERIC_TIMEZONE: America/Los_Angeles
      N8N_METRICS: "true"
      N8N_METRICS_INCLUDE_DEFAULT_METRICS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      # Prune old executions so the DB doesn't balloon
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "336"          # hours (14 days)
      EXECUTIONS_DATA_PRUNE_TIMEOUT: "3600"
      # Webhook/Samsara secrets visible to function nodes
      SAMSARA_API_TOKEN: ${SAMSARA_API_TOKEN}
      SAMSARA_WEBHOOK_SECRET: ${SAMSARA_WEBHOOK_SECRET}
      NETSUITE_ACCOUNT_ID: ${NETSUITE_ACCOUNT_ID}
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"
    # n8n must NOT be reached directly from the internet. Traffic flows:
    # Internet -> Kong (8443) -> n8n:5678 (internal network). Admin UI via SSH tunnel.
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits: { cpus: '2.0', memory: 2G }
        reservations: { cpus: '0.5', memory: 512M }
    networks: [gateway-network]
    logging: *default-logging

  n8n-worker:
    image: n8nio/n8n:1.28.0
    # No container_name so we can scale with --scale n8n-worker=N
    <<: *default-restart
    command: ["n8n", "worker", "--concurrency=10"]
    environment:
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: America/Los_Angeles
      N8N_DIAGNOSTICS_ENABLED: "false"
      SAMSARA_API_TOKEN: ${SAMSARA_API_TOKEN}
      SAMSARA_WEBHOOK_SECRET: ${SAMSARA_WEBHOOK_SECRET}
      NETSUITE_ACCOUNT_ID: ${NETSUITE_ACCOUNT_ID}
    depends_on:
      n8n:   { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      replicas: 2
      resources:
        limits: { cpus: '2.0', memory: 2G }
        reservations: { cpus: '0.5', memory: 512M }
    networks: [gateway-network]
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Prometheus + Alertmanager
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: gateway-prometheus
    <<: *default-restart
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=20GB'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits: { cpus: '1.0', memory: 2G }
    networks: [gateway-network]
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: gateway-alertmanager
    <<: *default-restart
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    environment:
      ALERTMANAGER_SLACK_WEBHOOK: ${ALERTMANAGER_SLACK_WEBHOOK:-}
      ALERTMANAGER_PAGERDUTY_KEY: ${ALERTMANAGER_PAGERDUTY_KEY:-}
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "127.0.0.1:9093:9093"
    networks: [gateway-network]
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Exporters
  # --------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: gateway-postgres-exporter
    <<: *default-restart
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    expose: ["9187"]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [gateway-network]
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: gateway-redis-exporter
    <<: *default-restart
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose: ["9121"]
    depends_on:
      redis: { condition: service_healthy }
    networks: [gateway-network]
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: gateway-node-exporter
    <<: *default-restart
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    pid: host
    expose: ["9100"]
    networks: [gateway-network]
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: gateway-cadvisor
    <<: *default-restart
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose: ["8080"]
    networks: [gateway-network]
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Grafana + Loki + Promtail
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.1
    container_name: gateway-grafana
    <<: *default-restart
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_CONTENT_SECURITY_POLICY: "true"
      GF_INSTALL_PLUGINS: "grafana-clock-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3002:3000"
    depends_on: [prometheus, loki]
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 512M }
    networks: [gateway-network]
    logging: *default-logging

  loki:
    image: grafana/loki:2.9.6
    container_name: gateway-loki
    <<: *default-restart
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./config/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    expose: ["3100"]
    ports:
      - "127.0.0.1:3100:3100"
    networks: [gateway-network]
    logging: *default-logging

  promtail:
    image: grafana/promtail:2.9.6
    container_name: gateway-promtail
    <<: *default-restart
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./config/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    networks: [gateway-network]
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  redpanda0_data:
  redpanda1_data:
  redpanda2_data:
  n8n_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:

networks:
  gateway-network:
    driver: bridge
